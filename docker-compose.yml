version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_veterinaria_dev
    command: mongod --replSet rs0 --bind_ip_all --keyFile /data/mongo-keyfile
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_dev:/data/db
      - ./mongo-keyfile:/data/mongo-keyfile
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  mongodb_data_dev:
    name: mongodb_veterinaria_data_dev

networks:
  default:
    name: veterinaria_network_dev